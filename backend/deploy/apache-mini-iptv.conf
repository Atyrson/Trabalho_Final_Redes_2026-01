# Proxy reverso / API Gateway do Mini-IPTV (Apache HTTPD no R1).
# Termina TLS, serve o build do frontend React e encaminha /api/ para o backend no host S.
# Deploy: NetworkConfig/scripts/roteador-r1/r1proxy.sh (ajusta os Define e reinicia o Apache).

Define BACKEND_HOST 172.16.0.2
Define BACKEND_PORT 8000
Define DOCROOT /var/www/mini-iptv
Define TLS_CRT /etc/ssl/mini-iptv/r1.crt
Define TLS_KEY /etc/ssl/mini-iptv/r1.key

# HTTP -> redireciona tudo para HTTPS, preservando host e caminho.
<VirtualHost *:80>
    RewriteEngine On
    RewriteRule ^ https://%{HTTP_HOST}%{REQUEST_URI} [R=301,L]
</VirtualHost>

<VirtualHost *:443>
    SSLEngine on
    SSLCertificateFile    ${TLS_CRT}
    SSLCertificateKeyFile ${TLS_KEY}

    # Frontend React (build estatico) servido na raiz.
    DocumentRoot ${DOCROOT}
    <Directory ${DOCROOT}>
        Require all granted
        Options -Indexes
        # SPA: rotas do front que nao sao arquivo caem no index.html.
        # Requisicoes /api sao proxy (r->proxyreq) e nunca chegam ao filesystem,
        # entao o FallbackResource nao as intercepta.
        FallbackResource /index.html
    </Directory>

    # API Gateway: apenas /api/ e encaminhado ao backend no host S (HTTP interno).
    ProxyPreserveHost On
    ProxyPass        /api/ http://${BACKEND_HOST}:${BACKEND_PORT}/api/
    ProxyPassReverse /api/ http://${BACKEND_HOST}:${BACKEND_PORT}/api/

    # Sobrescreve qualquer X-Forwarded-For vindo do cliente: o backend classifica
    # LAN/WAN pelo PRIMEIRO IP do header, entao ele precisa ser o IP real que o
    # Apache enxerga. Com 'set', um cliente nao consegue forjar o perfil WAN.
    RequestHeader set X-Forwarded-For "%{REMOTE_ADDR}s"

    ErrorLog  ${APACHE_LOG_DIR}/mini-iptv_error.log
    CustomLog ${APACHE_LOG_DIR}/mini-iptv_access.log combined
</VirtualHost>
